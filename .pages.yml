media:
  input: public/uploads
  output: /uploads

content:
  - name: site_settings
    label: Ogólne
    type: file
    path: content/site.md
    fields:
      - name: title
        label: Tytuł
        type: string
      - name: tagline
        label: Hasło
        type: text
      - name: nav
        label: Nawigacja
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{fields.label}"
        fields:
          - name: label
            label: Etykieta
            type: string
          - name: href
            label: Link
            description: "Link wewnętrzny zaczynaj od '/' (np. '/news/'). Link zewnętrzny podaj z 'https://'."
            type: string
          - name: badge
            label: Odznaka
            description: "Krótki tekst (np. 'Intl'). Puste pole ukryje odznakę."
            type: string
          - name: autoChildren
            label: Automatyczne podstrony
            description: "Obsługiwane wartości: 'pozostale' oraz 'championship'. Inna wartość nie doda linków automatycznie."
            type: string
          - name: children
            label: Podstrony
            description: "Podmenu rozwijane. Uzupełniaj, gdy element menu ma działać jako dropdown."
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.label}"
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny zaczynaj od '/' (np. '/stowarzyszenie/o-nas/')."
                type: string
      - name: cta
        label: Przycisk w nagłówku
        description: "Przycisk w prawym górnym rogu nagłówka."
        type: object
        fields:
          - name: label
            label: Etykieta
            type: string
          - name: href
            label: Link
            description: "Link wewnętrzny: '/#sekcja' lub '/podstrona/'. Link zewnętrzny: 'https://...'."
            type: string
      - name: footerColumns
        label: Kolumny stopki
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{fields.title}"
        fields:
          - name: title
            label: Tytuł
            type: string
          - name: links
            label: Linki
            description: "Lista linków widocznych w danej kolumnie stopki."
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.label}"
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny zaczynaj od '/' lub '#'."
                type: string
      - name: contact
        label: Kontakt
        type: object
        fields:
          - name: email
            label: E-mail
            description: "Adres kontaktowy wyświetlany na stronie."
            type: string
          - name: phone
            label: Telefon
            description: "Numer telefonu w formacie międzynarodowym, np. '+48 123 456 789'."
            type: string
          - name: addressLines
            label: Linie adresu
            description: "Każdy wpis to osobna linia adresu."
            type: string
            list:
              collapsible:
                collapsed: true
      - name: socials
        label: Media społecznościowe
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{fields.label}"
        fields:
          - name: label
            label: Etykieta
            type: string
          - name: href
            label: Link
            description: "Adres profilu, np. 'https://instagram.com/...'."
            type: string
      - name: legal
        label: Informacje prawne
        type: object
        fields:
          - name: copyright
            label: Prawa autorskie
            type: string
      - name: newsIndex
        label: Aktualności - strona główna
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
      - name: fundingIndex
        label: Finansowanie - strona główna
        description: "Treści i listę wpisów finansowania z sekcji na stronie głównej edytujesz tutaj."
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
          - name: entries
            label: Wpisy finansowania
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.title}"
            fields:
              - name: organization
                label: Organizacja
                type: string
              - name: period
                label: Okres
                type: string
              - name: title
                label: Tytuł
                type: string
              - name: summary
                label: Podsumowanie
                type: text
              - name: reportUrl
                label: Plik sprawozdania
                description: "Opcjonalny plik do pobrania. Jeśli puste, przycisk pobierania nie będzie widoczny."
                type: file
                options:
                  rename: random
              - name: accentColor
                label: Kolor akcentu
                description: "Kolor w HEX, np. '#EC4899'."
                type: string
              - name: icon
                label: Ikona
                description: "Nazwa ikony z mapy w 'components/icon.tsx'."
                type: string
              - name: order
                label: Kolejność
                description: "Liczba porządkująca. Mniejsze wartości wyświetlą się wcześniej."
                type: number
      - name: videosIndex
        label: Filmy - strona główna
        description: "Treści i listę filmów z sekcji na stronie głównej edytujesz tutaj."
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
          - name: videos
            label: Lista filmów
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.title}"
            fields:
              - name: title
                label: Tytuł
                type: string
              - name: date
                label: Data
                description: "Wybierz datę filmu z kalendarza."
                type: date
                default: ""
                options:
                  format: yyyy-MM-dd
              - name: category
                label: Kategoria
                description: "Krótka kategoria wyświetlana przy filmie."
                type: string
              - name: thumbnail
                label: Miniatura
                description: "Obraz miniatury filmu (zalecane proporcje 16:9)."
                type: image
                options:
                  rename: random
              - name: youtubeId
                label: ID YouTube
                description: "Podaj tylko ID filmu, bez pełnego URL."
                type: string
              - name: order
                label: Kolejność
                description: "Liczba porządkująca. Mniejsze wartości wyświetlą się wcześniej."
                type: number

  - name: home
    label: Strona główna
    type: file
    path: content/home.md
    fields:
      - name: hero
        label: Sekcja hero
        description: "Główna sekcja otwierająca stronę główną."
        type: object
        fields:
          - name: title
            label: Tytuł
            type: string
          - name: subtitle
            label: Podtytuł
            type: text
          - name: primaryCta
            label: Przycisk główny
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny: '/#sekcja' lub '/podstrona/'."
                type: string
          - name: secondaryCta
            label: Przycisk dodatkowy
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny: '/#sekcja' lub '/podstrona/'."
                type: string
      - name: teamsSection
        label: Sekcja zespołów
        description: "Treść sekcji oraz kolejność zespołów na stronie głównej."
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: subtitle
            label: Podtytuł
            type: text
          - name: teams
            label: Lista zespołów
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.name}"
            fields:
              - name: name
                label: Nazwa
                type: string
              - name: coach
                label: Trener
                type: string
              - name: icon
                label: Ikona
                description: "Nazwa ikony z mapy w 'components/icon.tsx'."
                type: string
      - name: newsSection
        label: Sekcja aktualności
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: ctaLabel
            label: Etykieta przycisku
            type: string
          - name: ctaHref
            label: Link przycisku
            description: "Link do archiwum aktualności, np. '/news/'."
            type: string
      - name: eventHighlight
        label: Wyróżnione wydarzenie
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: date
            label: Data
            description: "Wybierz datę wydarzenia z kalendarza."
            type: date
            default: ""
            options:
              format: yyyy-MM-dd
          - name: time
            label: Godzina
            description: "Krótki opis godziny, np. 'Start zawodów: 10:00'."
            type: string
          - name: location
            label: Lokalizacja
            type: string
          - name: venue
            label: Miejsce
            type: string
          - name: primaryCta
            label: Przycisk główny
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Najczęściej '/championship/' lub sekcja typu '#regulations'."
                type: string
          - name: secondaryCta
            label: Przycisk dodatkowy
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Najczęściej '/championship/' lub sekcja typu '#regulations'."
                type: string
      - name: videoHighlight
        label: Wyróżnione wideo
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
          - name: ctaLabel
            label: Etykieta przycisku
            type: string
          - name: ctaHref
            label: Link przycisku
            description: "Link do podstrony z filmami, np. '/filmy/'."
            type: string
          - name: youtubeId
            label: ID YouTube
            description: "Podaj tylko ID filmu (np. 'dQw4w9WgXcQ'), bez pełnego URL."
            type: string
      - name: ctaBand
        label: Sekcja CTA
        type: object
        fields:
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
          - name: primaryCta
            label: Przycisk główny
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny: '/#kontakt' lub '/podstrona/'."
                type: string
          - name: secondaryCta
            label: Przycisk dodatkowy
            type: object
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Link wewnętrzny: '/#kontakt' lub '/podstrona/'."
                type: string
      - name: sponsorsSection
        label: Sekcja sponsorów
        description: "Treść sekcji oraz kolejność sponsorów na stronie głównej."
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: sponsors
            label: Lista sponsorów
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.name}"
            fields:
              - name: name
                label: Nazwa
                type: string
              - name: logo
                label: Logo
                description: "Opcjonalne logo sponsora. Jeśli pole zostanie puste, pokaże się placeholder z nazwą."
                type: image
                options:
                  rename: random
              - name: href
                label: Link do strony
                description: "Opcjonalny pełny adres strony sponsora, np. 'https://example.com'. Link otworzy się w nowej karcie."
                type: string
      - name: fundingSummarySection
        label: Sekcja podsumowania finansowania
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: description
            label: Opis
            type: text
          - name: ctaLabel
            label: Etykieta przycisku
            type: string
          - name: ctaHref
            label: Link przycisku
            description: "Link do strony finansowania, np. '/finansowanie/'."
            type: string
  - name: news_posts
    label: Wpisy aktualności
    type: collection
    path: content/news
    exclude:
      - index.md
    description: "Każdy wpis tworzy osobną aktualność na stronie i własny adres URL."
    fields:
      - name: title
        label: Tytuł
        type: string
      - name: date
        label: Data
        description: "Data publikacji wpisu. Wybierz ją z kalendarza."
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
      - name: category
        label: Kategoria
        description: "Krótka kategoria widoczna na kartach aktualności."
        type: string
      - name: excerpt
        label: Zajawka
        type: text
      - name: heroImage
        label: Obraz główny
        description: "Zdjęcie nagłówkowe wpisu. Zalecane proporcje poziome (min. 1200 px szerokości)."
        type: image
        options:
          rename: random
      - name: body
        label: Treść
        type: rich-text

  - name: championship
    label: Mistrzostwa (PL + EN)
    type: collection
    path: content/championship
    filename: "{slug}.md"
    view:
      fields: [ slug, pl.subtitle, pl.dateStart ]
      primary: slug
      sort: [ pl.dateStart, slug ]
      default:
        sort: pl.dateStart
        order: desc
    fields:
      - name: slug
        label: Slug (nazwa URL)
        description: "Adres strony i nazwa pliku, np. 'championship-2026'. Używaj małych liter, cyfr i myślników."
        type: string
        pattern: "^[a-z0-9-]+$"
      - name: pl
        label: Wersja PL
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: subtitle
            label: Podtytuł
            type: string
          - name: dateStart
            label: Data rozpoczęcia
            description: "Wybierz pierwszy dzień wydarzenia z kalendarza."
            type: date
            default: ""
            options:
              format: yyyy-MM-dd
          - name: dateEnd
            label: Data zakończenia
            description: "Wybierz ostatni dzień wydarzenia z kalendarza."
            type: date
            default: ""
            options:
              format: yyyy-MM-dd
          - name: location
            label: Lokalizacja
            type: string
          - name: videoUrl
            label: Wideorelacja (YouTube)
            description: "Wklej link YouTube (np. https://www.youtube.com/watch?v=... lub https://youtu.be/...). Gdy pole jest puste, na stronie pokaże się 'wkrótce'."
            type: string
          - name: ctas
            label: Przyciski CTA
            description: "Przyciski widoczne na górze strony wydarzenia."
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.label}"
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Dozwolone: link sekcji (np. '#files'), wewnętrzny ('/.../') lub zewnętrzny ('https://...')."
                type: string
              - name: variant
                label: Wariant
                type: select
                options:
                  values: [ primary, secondary ]
          - name: sidebarHelp
            label: Pomoc boczna
            type: object
            fields:
              - name: title
                label: Tytuł
                type: string
              - name: description
                label: Opis
                type: text
              - name: ctaLabel
                label: Etykieta przycisku
                type: string
              - name: ctaHref
                label: Link przycisku
                type: string
          - name: sections
            label: Sekcje (stały układ)
            description: "Sekcje są stałe (jak w edycji 2026): opis, pliki, miejsce. Nie można zmieniać ich kolejności."
            type: object
            fields:
              - name: description
                label: "Sekcja: Opis wydarzenia"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Nazwa ikony z mapy w 'components/icon.tsx'."
                    type: string
                  - name: body
                    label: Treść sekcji
                    type: rich-text
              - name: files
                label: "Sekcja: Pliki i dokumenty"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Nazwa ikony z mapy w 'components/icon.tsx'."
                    type: string
                  - name: body
                    label: Treść sekcji
                    type: rich-text
                  - name: cards
                    label: Karty
                    description: "Każda karta może prowadzić do wgranego pliku albo zewnętrznego linku."
                    type: object
                    list:
                      collapsible:
                        collapsed: true
                        summary: "{fields.title}"
                    fields:
                      - name: title
                        label: Tytuł
                        type: string
                      - name: description
                        label: Opis
                        type: text
                      - name: file
                        label: Plik
                        description: "Wgraj regulamin lub inny dokument przez media PagesCMS. Pliki trafią do 'public/uploads/championship'."
                        type: file
                        options:
                          path: championship
                          categories: [ document, compressed ]
                          rename: random
                      - name: href
                        label: Link (opcjonalny)
                        description: "Opcjonalny fallback dla zewnętrznego URL. Jeśli podasz plik i link, użyty będzie plik."
                        type: string
                      - name: meta
                        label: Dodatkowa informacja
                        type: string
                      - name: icon
                        label: Ikona
                        type: string
              - name: venue
                label: "Sekcja: Miejsce"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Nazwa ikony z mapy w 'components/icon.tsx'."
                    type: string
                  - name: body
                    label: Treść sekcji
                    type: rich-text
                  - name: mapEmbed
                    label: Osadzenie mapy
                    description: "Adres URL do osadzonej mapy (iframe src)."
                    type: string
                  - name: address
                    label: Adres
                    description: "Pełny adres pokazywany nad mapą (z przyciskiem kopiowania)."
                    type: string
                  - name: image
                    label: Obraz
                    description: "Opcjonalny obraz sekcji."
                    type: image
                    options:
                      rename: random
          - name: richText
            label: Dodatkowa treść
            type: rich-text

      - name: en
        label: Wersja EN
        type: object
        fields:
          - name: eyebrow
            label: Nadtytuł
            type: string
          - name: title
            label: Tytuł
            type: string
          - name: subtitle
            label: Podtytuł
            type: string
          - name: dateStart
            label: Data rozpoczęcia
            description: "Wybierz pierwszy dzień wydarzenia z kalendarza."
            type: date
            default: ""
            options:
              format: yyyy-MM-dd
          - name: dateEnd
            label: Data zakończenia
            description: "Wybierz ostatni dzień wydarzenia z kalendarza."
            type: date
            default: ""
            options:
              format: yyyy-MM-dd
          - name: location
            label: Lokalizacja
            type: string
          - name: videoUrl
            label: Wideorelacja (YouTube)
            description: "Wklej link YouTube (np. https://www.youtube.com/watch?v=... lub https://youtu.be/...). Gdy pole jest puste, na stronie pokaże się 'coming soon'."
            type: string
          - name: ctas
            label: Przyciski CTA
            description: "Przyciski widoczne na górze strony wydarzenia."
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{fields.label}"
            fields:
              - name: label
                label: Etykieta
                type: string
              - name: href
                label: Link
                description: "Allowed: section link (e.g. '#files'), internal ('/.../') or external ('https://...')."
                type: string
              - name: variant
                label: Wariant
                type: select
                options:
                  values: [ primary, secondary ]
          - name: sidebarHelp
            label: Pomoc boczna
            type: object
            fields:
              - name: title
                label: Tytuł
                type: string
              - name: description
                label: Opis
                type: text
              - name: ctaLabel
                label: Etykieta przycisku
                type: string
              - name: ctaHref
                label: Link przycisku
                type: string
          - name: sections
            label: Sekcje (stały układ)
            description: "Sekcje są stałe (jak w edycji 2026): opis, pliki, miejsce. Nie można zmieniać ich kolejności."
            type: object
            fields:
              - name: description
                label: "Sekcja: Opis wydarzenia"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Icon name from 'components/icon.tsx'."
                    type: string
                  - name: body
                    label: Treść sekcji
                    type: rich-text
              - name: files
                label: "Sekcja: Pliki i dokumenty"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Icon name from 'components/icon.tsx'."
                    type: string
                  - name: body
                    label: Treść sekcji
                    type: rich-text
                  - name: cards
                    label: Karty
                    description: "Każda karta może prowadzić do wgranego pliku albo zewnętrznego linku."
                    type: object
                    list:
                      collapsible:
                        collapsed: true
                        summary: "{fields.title}"
                    fields:
                      - name: title
                        label: Tytuł
                        type: string
                      - name: description
                        label: Opis
                        type: text
                      - name: file
                        label: Plik
                        description: "Upload regulations and other documents via PagesCMS media. Files are stored under 'public/uploads/championship'."
                        type: file
                        options:
                          path: championship
                          categories: [ document, compressed ]
                          rename: random
                      - name: href
                        label: Link (opcjonalny)
                        description: "Optional fallback for an external URL. If both file and link are set, file is used."
                        type: string
                      - name: meta
                        label: Dodatkowa informacja
                        type: string
                      - name: icon
                        label: Ikona
                        type: string
              - name: venue
                label: "Sekcja: Miejsce"
                type: object
                fields:
                  - name: title
                    label: Tytuł
                    type: string
                  - name: icon
                    label: Ikona
                    description: "Icon name from 'components/icon.tsx'."
